name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.6.0"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}

jobs:
  publish:
    name: Publish crates.io packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Validate release version
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          metadata="$(cargo metadata --no-deps --format-version 1)"
          lib_version="$(jq -r '.packages[] | select(.name == "office2pdf") | .version' <<<"${metadata}")"
          cli_version="$(jq -r '.packages[] | select(.name == "office2pdf-cli") | .version' <<<"${metadata}")"
          cli_dependency="$(jq -r '.packages[] | select(.name == "office2pdf-cli") | .dependencies[] | select(.name == "office2pdf") | .req' <<<"${metadata}")"

          if [[ "${lib_version}" != "${version}" ]]; then
            echo "::error::office2pdf version ${lib_version} does not match ${RELEASE_TAG}"
            exit 1
          fi

          if [[ "${cli_version}" != "${version}" ]]; then
            echo "::error::office2pdf-cli version ${cli_version} does not match ${RELEASE_TAG}"
            exit 1
          fi

          case "${cli_dependency}" in
            "${version}"|"^${version}") ;;
            *)
              echo "::error::office2pdf-cli depends on office2pdf ${cli_dependency}, expected ${version}"
              exit 1
              ;;
          esac

      - name: Check crates.io token
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${CARGO_REGISTRY_TOKEN}" ]]; then
            echo "::error::CARGO_REGISTRY_TOKEN secret is required to publish crates"
            exit 1
          fi

      - name: Publish office2pdf
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          set +e
          output="$(cargo publish -p office2pdf 2>&1)"
          status=$?
          set -e
          printf '%s\n' "${output}"

          if [[ "${status}" -eq 0 ]]; then
            exit 0
          fi

          if grep -F "already exists on crates.io index" <<<"${output}" > /dev/null; then
            echo "office2pdf ${version} is already published"
            exit 0
          fi

          exit "${status}"

      - name: Publish office2pdf-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          for attempt in {1..30}; do
            set +e
            output="$(cargo publish -p office2pdf-cli 2>&1)"
            status=$?
            set -e
            printf '%s\n' "${output}"

            if [[ "${status}" -eq 0 ]]; then
              exit 0
            fi

            if grep -F "already exists on crates.io index" <<<"${output}" > /dev/null; then
              echo "office2pdf-cli ${version} is already published"
              exit 0
            fi

            if grep -E "failed to select a version for the requirement .office2pdf|no matching package named .office2pdf" <<<"${output}" > /dev/null; then
              echo "office2pdf ${version} is not visible to cargo publish yet; retry ${attempt}/30"
              sleep 20
              continue
            fi

            exit "${status}"
          done

          echo "::error::office2pdf-cli ${version} could not be published after waiting for office2pdf ${version}"
          exit 1

  binaries:
    name: Build release binaries (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          # Intel macOS runners (macos-13) are retired; cross-compile from
          # the Apple Silicon runner instead.
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release -p office2pdf-cli --target ${{ matrix.target }}

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          set -euo pipefail
          staging="office2pdf-${RELEASE_TAG}-${{ matrix.target }}"
          mkdir "${staging}"
          cp "target/${{ matrix.target }}/release/office2pdf" "${staging}/"
          cp README.md LICENSE "${staging}/"
          tar czf "${staging}.tar.gz" "${staging}"
          echo "ASSET=${staging}.tar.gz" >> "${GITHUB_ENV}"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $staging = "office2pdf-$env:RELEASE_TAG-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/office2pdf.exe" $staging
          Copy-Item README.md $staging
          Compress-Archive -Path $staging -DestinationPath "$staging.zip"
          Add-Content -Path $env:GITHUB_ENV -Value "ASSET=$staging.zip"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release upload "${RELEASE_TAG}" "${ASSET}" --clobber
